[custom]
; ============================================
; ACL4SSR + Loyalsoldier 规则整合配置
; ============================================

; ========== 策略组定义 ==========
custom_proxy_group=🚀 手动`select`[]🔯 后备`[]DIRECT`.*
custom_proxy_group=🔯 后备`fallback`.*`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🎯 直连`select`[]DIRECT`
custom_proxy_group=🛑 拦截`select`[]REJECT`
custom_proxy_group=🐟 漏网`select`[]🚀 手动`

; ========== 规则定义 ==========
; 1. 本地网络直连（最高优先级）
ruleset=🎯 直连,https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/lancidr.txt
ruleset=🎯 直连,https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/private.txt

; 2. 广告拦截
ruleset=🛑 拦截,https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/reject.txt

; 3. Apple 直连
ruleset=🎯 直连,https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/apple.txt
ruleset=🎯 直连,https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/icloud.txt

; 4. 中国域名直连
ruleset=🎯 直连,https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/direct.txt

; 5. 需要直连的常见软件（可选）
;ruleset=🎯 直连,https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/applications.txt

; 6-9. 国外代理规则
ruleset=🚀 手动,https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/gfw.txt
ruleset=🚀 手动,https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/proxy.txt
ruleset=🚀 手动,https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/telegramcidr.txt
;ruleset=🚀 手动,https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/tld-not-cn.txt

; 10. 中国 IP 直连
ruleset=🎯 直连,https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/cncidr.txt
ruleset=🎯 直连,[]GEOIP,CN

; 11. 兜底规则
ruleset=🐟 漏网,[]FINAL

; ========== 配置选项 ==========
enable_rule_generator=true
overwrite_original_rules=true
