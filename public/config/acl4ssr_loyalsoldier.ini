[custom]
; ============================================
; ACL4SSR + Loyalsoldier 精简整合配置
; 策略组：自选、机选、直连、智星、其他
; ============================================

; ==================== 策略组 ====================
custom_proxy_group=🚀 自选`select`[]♻️ 自动选择`[]DIRECT`.*
custom_proxy_group=♻️ 机选`url-test`.*`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🎯 直连`select`[]DIRECT`[]🚀 自选`[]♻️ 机选
custom_proxy_group=🤖 智星`select`[]🚀 自选`[]♻️ 机选`[]🎯 直连`.*`
custom_proxy_group=🛑 拦截`select`[]REJECT`[]DIRECT
custom_proxy_group=🐟 其他`select`[]🚀 自选`[]🎯 直连`[]♻️ 机选`.*

; ==================== 规则集（Ruleset）================
; 1. 最高优先级：本地/局域网直连（强烈推荐最前，解决局域网走代理问题）
ruleset=🎯 直连,https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/lancidr.txt
ruleset=🎯 直连,https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/private.txt

; 2. 广告与追踪拦截
ruleset=🛑 拦截,https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/reject.txt

; 3. Apple 服务直连
ruleset=🎯 直连,https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/apple.txt
ruleset=🎯 直连,https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/icloud.txt

; 4. 中国域名与 IP 直连
ruleset=🎯 直连,https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/direct.txt
ruleset=🎯 直连,https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/cncidr.txt

; 5. AI 平台（智星）——包含 OpenAI、Claude、Grok 等
ruleset=🤖 智星,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/AI.list
ruleset=🤖 智星,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/OpenAi.list

; 6. 国外需要代理的内容（GFW + Proxy）
ruleset=🚀 自选,https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/gfw.txt
ruleset=🚀 自选,https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/proxy.txt

; 7. 最终兜底
ruleset=🐟 其他,[]FINAL

; ========== 配置选项 ==========
enable_rule_generator=true
overwrite_original_rules=true
