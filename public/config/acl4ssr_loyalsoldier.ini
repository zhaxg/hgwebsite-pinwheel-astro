[custom]
; ============================================
; ACL4SSR + Loyalsoldier 规则整合配置
; ============================================

; ========== 策略组定义 ==========
custom_proxy_group=🚀 节点选择`select`[]🔯 故障转移`[]♻️ 自动选择`[]DIRECT`.*
custom_proxy_group=♻️ 自动选择`url-test`^(?!.*zhaxg).*$`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🔯 故障转移`fallback`^(?!.*zhaxg).*$`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🎯 全球直连`select`[]DIRECT`
custom_proxy_group=🛑 全球拦截`select`[]REJECT`
custom_proxy_group=🐟 漏网之鱼`select`[]🚀 节点选择`

; ========== 规则定义 ==========
; 1. 本地网络直连（最高优先级）
ruleset=🎯 全球直连,https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/lancidr.txt
ruleset=🎯 全球直连,https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/private.txt

; 2. 广告拦截
ruleset=🛑 全球拦截,https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/reject.txt

; 3. Apple 直连
ruleset=🎯 全球直连,https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/apple.txt
ruleset=🎯 全球直连,https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/icloud.txt

; 4. 中国域名直连
ruleset=🎯 全球直连,https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/direct.txt

; 5. 需要直连的常见软件（可选）
;ruleset=🎯 全球直连,https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/applications.txt

; 6-9. 国外代理规则
ruleset=🚀 节点选择,https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/gfw.txt
ruleset=🚀 节点选择,https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/proxy.txt
ruleset=🚀 节点选择,https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/telegramcidr.txt
;ruleset=🚀 节点选择,https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/tld-not-cn.txt

; 10. 中国 IP 直连
ruleset=🎯 全球直连,https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/cncidr.txt
ruleset=🎯 全球直连,[]GEOIP,CN

; 11. 兜底规则
ruleset=🐟 漏网之鱼,[]FINAL

; ========== 配置选项 ==========
enable_rule_generator=true
overwrite_original_rules=true
